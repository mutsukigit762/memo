:root {
  --bg: #1c1c1e;
  --card: #2c2c2e;
  --input-bg: #3a3a3c;
  --border: rgba(255,255,255,0.1);
  --text: #ffffff;
  --text-muted: rgba(235,235,245,0.6);
  --text-dim: rgba(235,235,245,0.3);
  --yellow: #ffd60a;
  --red: #ff453a;
  --safe-top: env(safe-area-inset-top, 44px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}

html, body {
  height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, 'Hiragino Sans', sans-serif;
  -webkit-font-smoothing: antialiased;
}

/* ページ管理 */
.page {
  position: fixed;
  inset: 0;
  background: var(--bg);
  display: none;
  flex-direction: column;
}

.page.active {
  display: flex;
}

/* ===== 一覧画面 ===== */
#listPage .top {
  padding-top: calc(var(--safe-top) + 8px);
  padding: calc(var(--safe-top) + 8px) 20px 12px;
}

#listPage .title {
  font-size: 34px;
  font-weight: 700;
  letter-spacing: -0.5px;
  margin-bottom: 2px;
}

#listPage .count {
  font-size: 13px;
  color: var(--text-muted);
}

#listPage .scroll-area {
  flex: 1;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  padding: 12px 16px 0;
}

#listPage .scroll-area::-webkit-scrollbar { display: none; }

.memo-card {
  background: var(--card);
  border-radius: 12px;
  padding: 13px 16px;
  margin-bottom: 10px;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
}

.memo-card:active { opacity: 0.6; }

.memo-card-title {
  font-size: 15px;
  font-weight: 600;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  margin-bottom: 3px;
}

.memo-card-row {
  display: flex;
  gap: 8px;
  align-items: baseline;
}

.memo-card-date {
  font-size: 13px;
  color: var(--text-muted);
  flex-shrink: 0;
}

.memo-card-preview {
  font-size: 13px;
  color: var(--text-dim);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.match { color: var(--yellow); }

.empty {
  text-align: center;
  color: var(--text-dim);
  font-size: 14px;
  padding-top: 60px;
}

#listPage .bottom {
  padding: 10px 16px;
  padding-bottom: calc(10px + var(--safe-bottom));
  border-top: 1px solid var(--border);
  background: rgba(28,28,30,0.95);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
}

.bottom-row {
  display: flex;
  align-items: center;
  gap: 10px;
}

.search-box {
  flex: 1;
  display: flex;
  align-items: center;
  background: var(--input-bg);
  border-radius: 10px;
  padding: 8px 12px;
  gap: 6px;
}

.search-box span {
  color: var(--text-dim);
  font-size: 16px;
  flex-shrink: 0;
}

#searchInput {
  flex: 1;
  background: none;
  border: none;
  outline: none;
  color: var(--text);
  font-size: 15px;
  font-family: inherit;
}

#searchInput::placeholder { color: var(--text-dim); }

.btn-add {
  width: 44px;
  height: 44px;
  border-radius: 50%;
  background: var(--yellow);
  border: none;
  color: #1c1c1e;
  font-size: 26px;
  font-weight: 300;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  -webkit-tap-highlight-color: transparent;
  box-shadow: 0 2px 12px rgba(255,214,10,0.4);
  line-height: 1;
}

.btn-add:active { transform: scale(0.9); }

/* ===== 編集画面 ===== */
#editPage .nav {
  display: flex;
  align-items: center;
  padding-top: calc(var(--safe-top) + 4px);
  padding-left: 4px;
  padding-right: 16px;
  padding-bottom: 4px;
  border-bottom: 1px solid var(--border);
}

.btn-back {
  background: none;
  border: none;
  color: var(--yellow);
  font-size: 17px;
  font-family: inherit;
  cursor: pointer;
  padding: 10px 12px;
  display: flex;
  align-items: center;
  gap: 2px;
  -webkit-tap-highlight-color: transparent;
}

.btn-back:active { opacity: 0.6; }

.nav-meta {
  flex: 1;
  text-align: center;
  font-size: 12px;
  color: var(--text-muted);
}

.btn-del {
  background: none;
  border: none;
  color: var(--red);
  font-size: 15px;
  font-family: inherit;
  cursor: pointer;
  padding: 10px 4px;
  -webkit-tap-highlight-color: transparent;
}

.btn-del:active { opacity: 0.6; }
.btn-del.hidden { visibility: hidden; }

#editArea {
  flex: 1;
  background: transparent;
  border: none;
  outline: none;
  resize: none;
  color: var(--text);
  font-family: inherit;
  font-size: 16px;
  line-height: 1.75;
  padding: 16px 20px;
  -webkit-overflow-scrolling: touch;
}

#editArea::placeholder { color: var(--text-dim); }

<body>

<!-- 一覧ページ -->

<div class="page active" id="listPage">
  <div class="top">
    <div class="title">メモ</div>
    <div class="count" id="countEl">読み込み中...</div>
  </div>
  <div class="scroll-area" id="listEl"></div>
  <div class="bottom">
    <div class="bottom-row">
      <div class="search-box">
        <span>⌕</span>
        <input type="search" id="searchInput" placeholder="検索">
      </div>
      <button class="btn-add" id="btnAdd">+</button>
    </div>
  </div>
</div>

<!-- 編集ページ -->

<div class="page" id="editPage">
  <div class="nav">
    <button class="btn-back" id="btnBack">‹ メモ</button>
    <div class="nav-meta" id="navMeta"></div>
    <button class="btn-del hidden" id="btnDel">削除</button>
  </div>
  <textarea id="editArea" placeholder="メモを入力..."></textarea>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
import { getFirestore, collection, addDoc, updateDoc, deleteDoc, doc, serverTimestamp, query, orderBy, onSnapshot } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCy2qi8vFTqlqjc0VBd8GEbuh6FO0fhs9w",
  authDomain: "memo-ce334.firebaseapp.com",
  projectId: "memo-ce334",
  storageBucket: "memo-ce334.firebasestorage.app",
  messagingSenderId: "732811990086",
  appId: "1:732811990086:web:5b69ceb89f80cae7f9a647"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let memos = [];
let currentId = null;
let saveTimer = null;
let searchQ = "";

const listPage  = document.getElementById("listPage");
const editPage  = document.getElementById("editPage");
const listEl    = document.getElementById("listEl");
const countEl   = document.getElementById("countEl");
const searchInput = document.getElementById("searchInput");
const btnAdd    = document.getElementById("btnAdd");
const btnBack   = document.getElementById("btnBack");
const btnDel    = document.getElementById("btnDel");
const editArea  = document.getElementById("editArea");
const navMeta   = document.getElementById("navMeta");
// ページ切り替え
function showList() {
  editPage.classList.remove("active");
  listPage.classList.add("active");
}

function showEdit() {
  listPage.classList.remove("active");
  editPage.classList.add("active");
  setTimeout(() => editArea.focus(), 100);
}

// 日付
function fmtDate(ts) {
  if (!ts) return "";
  const d = ts.toDate ? ts.toDate() : new Date(ts);
  const now = new Date();
  const today = new Date(now); today.setHours(0,0,0,0);
  const yest  = new Date(today); yest.setDate(today.getDate()-1);
  if (now - d < 60000) return "たった今";
  if (d >= today) return `${d.getHours()}:${String(d.getMinutes()).padStart(2,"0")}`;
  if (d >= yest)  return "昨日";
  if (d.getFullYear() === now.getFullYear()) return `${d.getMonth()+1}/${d.getDate()}`;
  return `${d.getFullYear()}/${d.getMonth()+1}/${d.getDate()}`;
}

function fmtFull(ts) {
  if (!ts) return "";
  const d = ts.toDate ? ts.toDate() : new Date(ts);
  return `${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日`;
}

function esc(s) {
  return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

function hi(text, q) {
  if (!q) return esc(text);
  const re = new RegExp(q.replace(/[.*+?^${}()|[\]\\]/g,"\\$&"), "gi");
  return esc(text).replace(re, m => `<span class="match">${m}</span>`);
}

function firstLine(body) {
  return body.split("\n").find(l => l.trim()) || "新規メモ";
}

function restLines(body) {
  const lines = body.split("\n").filter(l => l.trim());
  return lines.slice(1).join(" ") || "";
}

// 一覧描画
function renderList() {
  const q = searchQ.trim().toLowerCase();
  const filtered = q ? memos.filter(m => m.body.toLowerCase().includes(q)) : memos;

  countEl.textContent = `${memos.length}件のメモ`;
  listEl.innerHTML = "";

  if (!filtered.length) {
    listEl.innerHTML = `<div class="empty">${q ? "見つかりません" : "メモがありません"}</div>`;
    return;
  }

  filtered.forEach(m => {
    const card = document.createElement("div");
    card.className = "memo-card";
    card.innerHTML = `
      <div class="memo-card-title">${hi(firstLine(m.body), q)}</div>
      <div class="memo-card-row">
        <span class="memo-card-date">${fmtDate(m.updatedAt || m.createdAt)}</span>
        <span class="memo-card-preview">${hi(restLines(m.body).slice(0,60), q)}</span>
      </div>
    `;
    card.addEventListener("click", () => openMemo(m.id));
    listEl.appendChild(card);
  });
}

// メモを開く
function openMemo(id) {
  const m = memos.find(x => x.id === id);
  if (!m) return;
  currentId = id;
  editArea.value = m.body;
  navMeta.textContent = fmtFull(m.createdAt);
  btnDel.classList.remove("hidden");
  showEdit();
}

// 新規作成
btnAdd.addEventListener("click", async () => {
  try {
    const ref = await addDoc(collection(db, "memos"), {
      body: "",
      createdAt: serverTimestamp(),
      updatedAt: serverTimestamp()
    });
    memos.unshift({ id: ref.id, body: "", createdAt: null, updatedAt: null });
    currentId = ref.id;
    editArea.value = "";
    navMeta.textContent = "";
    btnDel.classList.add("hidden");
    showEdit();
  } catch(e) {
    console.error(e);
  }
});

// 戻る
btnBack.addEventListener("click", () => {
  flushSave();
  currentId = null;
  showList();
  renderList();
});

// 自動保存
editArea.addEventListener("input", () => {
  clearTimeout(saveTimer);
  saveTimer = setTimeout(flushSave, 1000);
});

async function flushSave() {
  clearTimeout(saveTimer);
  if (!currentId) return;
  const body = editArea.value;
  const m = memos.find(x => x.id === currentId);
  if (!m || m.body === body) return;
  m.body = body;
  m.updatedAt = new Date();
  try {
    await updateDoc(doc(db, "memos", currentId), { body, updatedAt: serverTimestamp() });
  } catch(e) {
    console.error(e);
  }
}

// 削除
btnDel.addEventListener("click", async () => {
  if (!currentId) return;
  if (!confirm("このメモを削除しますか？")) return;
  try {
    await deleteDoc(doc(db, "memos", currentId));
    memos = memos.filter(x => x.id !== currentId);
    currentId = null;
    showList();
    renderList();
  } catch(e) {
    console.error(e);
  }
});

// 検索
searchInput.addEventListener("input", e => {
  searchQ = e.target.value;
  renderList();
});

// Firestore同期
const q = query(collection(db, "memos"), orderBy("updatedAt", "desc"));
onSnapshot(q, snap => {
  memos = snap.docs.map(d => ({ id: d.id, ...d.data() }));
  renderList();
}, err => {
  console.error(err);
  listEl.innerHTML = `<div class="empty">接続できません</div>`;
});
</script>

</body>
</html>
