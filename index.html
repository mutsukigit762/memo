:root {
  --bg: #1c1c1e;
  --surface: #2c2c2e;
  --surface2: #3a3a3c;
  --border: rgba(255,255,255,0.08);
  --text: #ffffff;
  --text-sub: #ebebf5cc;
  --text-muted: #ebebf599;
  --text-dim: #ebebf560;
  --accent: #ffd60a;
  --card-bg: #2c2c2e;
  --safe-bottom: env(safe-area-inset-bottom, 0px);
  --safe-top: env(safe-area-inset-top, 0px);
}

html, body {
  height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, 'Hiragino Sans', 'Hiragino Kaku Gothic ProN', sans-serif;
  -webkit-font-smoothing: antialiased;
  overflow: hidden;
}

body {
  display: flex;
  flex-direction: column;
  height: 100dvh;
}

#mainView {
  display: flex;
  flex-direction: column;
  height: 100%;
}

.nav-bar {
  flex-shrink: 0;
  padding-top: calc(var(--safe-top) + 12px);
  padding-left: 20px;
  padding-right: 20px;
  padding-bottom: 8px;
}

.nav-title {
  font-size: 34px;
  font-weight: 700;
  letter-spacing: -0.5px;
  margin-bottom: 4px;
}

.nav-count {
  font-size: 13px;
  color: var(--text-muted);
  margin-bottom: 12px;
}

#memoList {
  flex: 1;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  padding: 0 16px;
}

#memoList::-webkit-scrollbar { display: none; }

.memo-card {
  background: var(--card-bg);
  border-radius: 12px;
  padding: 12px 16px;
  margin-bottom: 10px;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  transition: opacity 0.1s;
}

.memo-card:active { opacity: 0.6; }

.memo-card-title {
  font-size: 15px;
  font-weight: 600;
  color: var(--text);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  margin-bottom: 3px;
}

.memo-card-sub {
  display: flex;
  gap: 8px;
  align-items: baseline;
}

.memo-card-date {
  font-size: 13px;
  color: var(--text-muted);
  flex-shrink: 0;
}

.memo-card-preview {
  font-size: 13px;
  color: var(--text-dim);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.memo-card-preview .match,
.memo-card-title .match {
  color: var(--accent);
}

.empty-state {
  text-align: center;
  color: var(--text-dim);
  font-size: 14px;
  margin-top: 60px;
}

.bottom-bar {
  flex-shrink: 0;
  padding: 10px 16px;
  padding-bottom: calc(10px + var(--safe-bottom));
  background: rgba(28,28,30,0.92);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-top: 1px solid var(--border);
}

.bottom-inner {
  display: flex;
  align-items: center;
  gap: 10px;
}

.search-field {
  flex: 1;
  display: flex;
  align-items: center;
  background: var(--surface2);
  border-radius: 10px;
  padding: 8px 12px;
  gap: 8px;
}

.search-icon {
  flex-shrink: 0;
  color: var(--text-dim);
  font-size: 15px;
}

#searchInput {
  flex: 1;
  background: none;
  border: none;
  outline: none;
  color: var(--text);
  font-size: 15px;
  font-family: inherit;
  min-width: 0;
}

#searchInput::placeholder { color: var(--text-dim); }

.btn-new {
  width: 44px;
  height: 44px;
  border-radius: 50%;
  background: var(--accent);
  border: none;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  flex-shrink: 0;
  -webkit-tap-highlight-color: transparent;
  transition: transform 0.1s, opacity 0.1s;
  box-shadow: 0 2px 12px rgba(255,214,10,0.4);
  font-size: 24px;
  color: #1c1c1e;
  font-weight: 300;
  line-height: 1;
}

.btn-new:active { transform: scale(0.9); }

/* エディタ */
#editorView {
  position: fixed;
  inset: 0;
  background: var(--bg);
  display: flex;
  flex-direction: column;
  transform: translateX(100%);
  transition: transform 0.28s cubic-bezier(0.4, 0, 0.2, 1);
  z-index: 10;
}

#editorView.open { transform: translateX(0); }

.editor-nav {
  flex-shrink: 0;
  display: flex;
  align-items: center;
  padding-top: calc(var(--safe-top) + 12px);
  padding-left: 4px;
  padding-right: 16px;
  padding-bottom: 8px;
}

.btn-back {
  display: flex;
  align-items: center;
  gap: 4px;
  background: none;
  border: none;
  color: var(--accent);
  font-size: 17px;
  font-family: inherit;
  cursor: pointer;
  padding: 8px 12px;
  -webkit-tap-highlight-color: transparent;
}

.btn-back-arrow {
  font-size: 20px;
  line-height: 1;
  margin-top: -1px;
}

.editor-nav-right {
  margin-left: auto;
}

.btn-delete {
  background: none;
  border: none;
  color: #ff453a;
  font-size: 15px;
  font-family: inherit;
  cursor: pointer;
  padding: 8px;
  -webkit-tap-highlight-color: transparent;
}

.btn-delete.hidden { display: none; }

.editor-meta {
  flex-shrink: 0;
  text-align: center;
  font-size: 12px;
  color: var(--text-muted);
  padding: 0 16px 10px;
}

#editorArea {
  flex: 1;
  background: transparent;
  border: none;
  outline: none;
  resize: none;
  color: var(--text);
  font-family: inherit;
  font-size: 16px;
  line-height: 1.7;
  padding: 4px 20px 40px;
  -webkit-overflow-scrolling: touch;
}

#editorArea::placeholder { color: var(--text-dim); }

#toast {
  position: fixed;
  bottom: calc(80px + var(--safe-bottom));
  left: 50%;
  transform: translateX(-50%) translateY(16px);
  background: var(--surface2);
  color: var(--text-sub);
  font-size: 13px;
  padding: 8px 16px;
  border-radius: 20px;
  opacity: 0;
  transition: opacity 0.2s, transform 0.2s;
  z-index: 100;
  white-space: nowrap;
  pointer-events: none;
}

#toast.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}

<body>

<div id="mainView">
  <div class="nav-bar">
    <div class="nav-title">メモ</div>
    <div class="nav-count" id="memoCount">読み込み中...</div>
  </div>

  <div id="memoList"></div>

  <div class="bottom-bar">
    <div class="bottom-inner">
      <div class="search-field">
        <span class="search-icon">⌕</span>
        <input type="search" id="searchInput" placeholder="検索">
      </div>
      <button class="btn-new" id="btnNew">+</button>
    </div>
  </div>
</div>

<div id="editorView">
  <div class="editor-nav">
    <button class="btn-back" id="btnBack">
      <span class="btn-back-arrow">‹</span>メモ
    </button>
    <div class="editor-nav-right">
      <button class="btn-delete hidden" id="btnDelete">削除</button>
    </div>
  </div>
  <div class="editor-meta" id="editorMeta"></div>
  <textarea id="editorArea" placeholder="メモを入力..."></textarea>
</div>

<div id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
import { getFirestore, collection, addDoc, updateDoc, deleteDoc, doc, serverTimestamp, query, orderBy, onSnapshot } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCy2qi8vFTqlqjc0VBd8GEbuh6FO0fhs9w",
  authDomain: "memo-ce334.firebaseapp.com",
  projectId: "memo-ce334",
  storageBucket: "memo-ce334.firebasestorage.app",
  messagingSenderId: "732811990086",
  appId: "1:732811990086:web:5b69ceb89f80cae7f9a647",
  measurementId: "G-DF3Z087VMQ"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const COLL = "memos";

let memos = [];
let currentId = null;
let saveTimer = null;
let searchQuery = "";

const memoListEl = document.getElementById("memoList");
const memoCountEl = document.getElementById("memoCount");
const editorView = document.getElementById("editorView");
const editorArea = document.getElementById("editorArea");
const editorMeta = document.getElementById("editorMeta");
const btnNew = document.getElementById("btnNew");
const btnBack = document.getElementById("btnBack");
const btnDelete = document.getElementById("btnDelete");
const searchInput = document.getElementById("searchInput");
const toastEl = document.getElementById("toast");

let toastTimer;
function showToast(msg) {
  toastEl.textContent = msg;
  toastEl.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => toastEl.classList.remove("show"), 1600);
}

function formatDate(ts) {
  if (!ts) return "";
  const d = ts.toDate ? ts.toDate() : new Date(ts);
  const now = new Date();
  const today = new Date(); today.setHours(0,0,0,0);
  const yesterday = new Date(today); yesterday.setDate(today.getDate()-1);
  const diff = now - d;
  if (diff < 60000) return "たった今";
  if (d >= today) return `${d.getHours()}:${String(d.getMinutes()).padStart(2,"0")}`;
  if (d >= yesterday) return "昨日";
  if (d.getFullYear() === now.getFullYear()) return `${d.getMonth()+1}/${d.getDate()}`;
  return `${d.getFullYear()}/${d.getMonth()+1}/${d.getDate()}`;
}

function formatDateFull(ts) {
  if (!ts) return "";
  const d = ts.toDate ? ts.toDate() : new Date(ts);
  return `${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日`;
}

function escHtml(s) {
  return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

function highlight(text, q) {
  if (!q) return escHtml(text);
  const esc = q.replace(/[.*+?^${}()|[\]\\]/g,"\\$&");
  return escHtml(text).replace(new RegExp(esc,"gi"), m => `<span class="match">${m}</span>`);
}

function getFirstLine(body) {
  const lines = body.split("\n").filter(l => l.trim());
  return lines[0] || "新規メモ";
}

function getPreview(body) {
  const lines = body.split("\n").filter(l => l.trim());
  return lines.slice(1).join(" ") || "追加テキストなし";
}

function renderList() {
  const q = searchQuery.trim().toLowerCase();
  const filtered = q ? memos.filter(m => m.body.toLowerCase().includes(q)) : memos;

  memoCountEl.textContent = `${memos.length}件のメモ`;
  memoListEl.innerHTML = "";

  if (filtered.length === 0) {
    memoListEl.innerHTML = `<div class="empty-state">${q ? "見つかりません" : "メモがありません"}</div>`;
    return;
  }

  filtered.forEach(m => {
    const title = getFirstLine(m.body);
    const preview = getPreview(m.body);
    const card = document.createElement("div");
    card.className = "memo-card";
    card.innerHTML = `
      <div class="memo-card-title">${highlight(title, q)}</div>
      <div class="memo-card-sub">
        <span class="memo-card-date">${formatDate(m.updatedAt || m.createdAt)}</span>
        <span class="memo-card-preview">${highlight(preview.slice(0,60), q)}</span>
      </div>
    `;
    card.addEventListener("click", () => openEditor(m.id));
    memoListEl.appendChild(card);
  });
}

function openEditor(id) {
  const memo = memos.find(m => m.id === id);
  if (!memo) return;
  currentId = id;
  editorArea.value = memo.body;
  editorMeta.textContent = memo.createdAt ? formatDateFull(memo.createdAt) : "";
  btnDelete.classList.remove("hidden");
  editorView.classList.add("open");
  setTimeout(() => editorArea.focus(), 300);
}

btnNew.addEventListener("click", async () => {
  try {
    const docRef = await addDoc(collection(db, COLL), {
      body: "",
      createdAt: serverTimestamp(),
      updatedAt: serverTimestamp()
    });
    memos.unshift({ id: docRef.id, body: "", createdAt: null, updatedAt: null });
    openEditor(docRef.id);
  } catch(e) {
    showToast("エラーが発生しました");
    console.error(e);
  }
});

btnBack.addEventListener("click", () => {
  flushSave();
  editorView.classList.remove("open");
  currentId = null;
  renderList();
});

editorArea.addEventListener("input", () => {
  clearTimeout(saveTimer);
  saveTimer = setTimeout(flushSave, 1000);
});

async function flushSave() {
  clearTimeout(saveTimer);
  if (!currentId) return;
  const body = editorArea.value;
  const memo = memos.find(m => m.id === currentId);
  if (!memo || memo.body === body) return;
  memo.body = body;
  memo.updatedAt = new Date();
  try {
    await updateDoc(doc(db, COLL, currentId), { body, updatedAt: serverTimestamp() });
    showToast("保存しました");
  } catch(e) {
    showToast("保存できませんでした");
    console.error(e);
  }
}

btnDelete.addEventListener("click", async () => {
  if (!currentId) return;
  if (!confirm("このメモを削除しますか？")) return;
  try {
    await deleteDoc(doc(db, COLL, currentId));
    memos = memos.filter(m => m.id !== currentId);
    currentId = null;
    editorView.classList.remove("open");
    renderList();
    showToast("削除しました");
  } catch(e) {
    showToast("削除できませんでした");
    console.error(e);
  }
});

searchInput.addEventListener("input", e => {
  searchQuery = e.target.value;
  renderList();
});

const q = query(collection(db, COLL), orderBy("updatedAt", "desc"));
onSnapshot(q, snapshot => {
  memos = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
  renderList();
}, err => {
  console.error(err);
  memoListEl.innerHTML = `<div class="empty-state">接続できません</div>`;
});
</script>

</body>
