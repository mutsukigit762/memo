:root {
  --bg: #0f0f0f;
  --surface: #1a1a1a;
  --surface2: #222222;
  --border: #2e2e2e;
  --text: #e8e8e0;
  --text-muted: #666660;
  --text-dim: #444440;
  --accent: #c8b89a;
  --accent-dim: #5a4f3e;
  --danger: #8a4040;
  --highlight: #2a2520;
}

html, body {
  height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: 'Noto Sans JP', sans-serif;
  font-weight: 300;
  -webkit-font-smoothing: antialiased;
}

body {
  display: flex;
  flex-direction: column;
  height: 100dvh;
  overflow: hidden;
}

/* ── ヘッダー ── */
header {
  flex-shrink: 0;
  padding: 16px 20px 12px;
  border-bottom: 1px solid var(--border);
  background: var(--bg);
}

.header-top {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 12px;
}

.app-title {
  font-family: 'DM Mono', monospace;
  font-size: 13px;
  font-weight: 300;
  color: var(--text-muted);
  letter-spacing: 0.15em;
  text-transform: lowercase;
  flex: 1;
}

.btn-new {
  background: none;
  border: 1px solid var(--border);
  color: var(--accent);
  font-family: 'DM Mono', monospace;
  font-size: 18px;
  font-weight: 300;
  width: 36px;
  height: 36px;
  border-radius: 6px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background 0.15s, border-color 0.15s;
  -webkit-tap-highlight-color: transparent;
}

.btn-new:active { background: var(--surface2); border-color: var(--accent-dim); }

.search-wrap {
  position: relative;
}

.search-icon {
  position: absolute;
  left: 10px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--text-dim);
  font-size: 13px;
  pointer-events: none;
}

#searchInput {
  width: 100%;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 9px 12px 9px 32px;
  color: var(--text);
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 14px;
  font-weight: 300;
  outline: none;
  transition: border-color 0.15s;
}

#searchInput::placeholder { color: var(--text-dim); }
#searchInput:focus { border-color: var(--accent-dim); }

/* ── リスト ── */
#memoList {
  flex: 1;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
}

#memoList:empty::after {
  content: 'メモがない';
  display: block;
  text-align: center;
  color: var(--text-dim);
  font-family: 'DM Mono', monospace;
  font-size: 12px;
  margin-top: 60px;
  letter-spacing: 0.1em;
}

.memo-item {
  padding: 14px 20px;
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  transition: background 0.1s;
  -webkit-tap-highlight-color: transparent;
}

.memo-item:active { background: var(--surface); }
.memo-item.selected { background: var(--highlight); }

.memo-preview {
  font-size: 14px;
  color: var(--text);
  line-height: 1.5;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  margin-bottom: 4px;
}

.memo-preview .match { color: var(--accent); background: var(--accent-dim); border-radius: 2px; padding: 0 2px; }

.memo-date {
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  color: var(--text-dim);
  font-weight: 300;
}

/* ── エディタパネル ── */
#editorPanel {
  position: fixed;
  inset: 0;
  background: var(--bg);
  display: flex;
  flex-direction: column;
  transform: translateX(100%);
  transition: transform 0.25s cubic-bezier(0.4, 0, 0.2, 1);
  z-index: 10;
}

#editorPanel.open { transform: translateX(0); }

.editor-header {
  flex-shrink: 0;
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 16px 20px;
  border-bottom: 1px solid var(--border);
}

.btn-back {
  background: none;
  border: none;
  color: var(--accent);
  font-family: 'DM Mono', monospace;
  font-size: 13px;
  font-weight: 300;
  cursor: pointer;
  padding: 4px 0;
  letter-spacing: 0.05em;
  -webkit-tap-highlight-color: transparent;
}

.editor-meta {
  flex: 1;
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  color: var(--text-dim);
  text-align: right;
}

.btn-delete {
  background: none;
  border: none;
  color: var(--danger);
  font-size: 16px;
  cursor: pointer;
  padding: 4px 8px;
  -webkit-tap-highlight-color: transparent;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.15s;
}

.btn-delete.visible { opacity: 1; pointer-events: all; }

#editorArea {
  flex: 1;
  background: transparent;
  border: none;
  outline: none;
  resize: none;
  color: var(--text);
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 15px;
  font-weight: 300;
  line-height: 1.8;
  padding: 20px;
  -webkit-overflow-scrolling: touch;
}

#editorArea::placeholder { color: var(--text-dim); }

/* ── ステータス ── */
#status {
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%) translateY(60px);
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--text-muted);
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  padding: 6px 14px;
  border-radius: 20px;
  letter-spacing: 0.08em;
  transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.3s;
  opacity: 0;
  z-index: 100;
  white-space: nowrap;
}

#status.show { transform: translateX(-50%) translateY(0); opacity: 1; }

/* ── ローディング ── */
#loading {
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 40px;
  color: var(--text-dim);
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  letter-spacing: 0.1em;
}

/* scrollbar */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

<body>

<header>
  <div class="header-top">
    <span class="app-title">memo</span>
    <button class="btn-new" id="btnNew" title="新規メモ">+</button>
  </div>
  <div class="search-wrap">
    <span class="search-icon">⌕</span>
    <input type="search" id="searchInput" placeholder="検索...">
  </div>
</header>

<div id="memoList">
  <div id="loading">読み込み中...</div>
</div>

<div id="editorPanel">
  <div class="editor-header">
    <button class="btn-back" id="btnBack">← 戻る</button>
    <span class="editor-meta" id="editorMeta"></span>
    <button class="btn-delete" id="btnDelete">🗑</button>
  </div>
  <textarea id="editorArea" placeholder="メモを書く..."></textarea>
</div>

<div id="status"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, updateDoc, deleteDoc, doc, serverTimestamp, query, orderBy, onSnapshot } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCy2qi8vFTqlqjc0VBd8GEbuh6FO0fhs9w",
  authDomain: "memo-ce334.firebaseapp.com",
  projectId: "memo-ce334",
  storageBucket: "memo-ce334.firebasestorage.app",
  messagingSenderId: "732811990086",
  appId: "1:732811990086:web:5b69ceb89f80cae7f9a647",
  measurementId: "G-DF3Z087VMQ"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const COLL = "memos";

// ── 状態 ──
let memos = [];
let currentId = null;
let saveTimer = null;
let searchQuery = "";

// ── DOM ──
const memoList = document.getElementById("memoList");
const editorPanel = document.getElementById("editorPanel");
const editorArea = document.getElementById("editorArea");
const editorMeta = document.getElementById("editorMeta");
const btnNew = document.getElementById("btnNew");
const btnBack = document.getElementById("btnBack");
const btnDelete = document.getElementById("btnDelete");
const searchInput = document.getElementById("searchInput");
const statusEl = document.getElementById("status");

// ── ステータス表示 ──
let statusTimer;
function showStatus(msg) {
  statusEl.textContent = msg;
  statusEl.classList.add("show");
  clearTimeout(statusTimer);
  statusTimer = setTimeout(() => statusEl.classList.remove("show"), 1800);
}

// ── 日付フォーマット ──
function formatDate(ts) {
  if (!ts) return "";
  const d = ts.toDate ? ts.toDate() : new Date(ts);
  const now = new Date();
  const diff = now - d;
  if (diff < 60000) return "たった今";
  if (diff < 3600000) return `${Math.floor(diff/60000)}分前`;
  if (diff < 86400000) return `${Math.floor(diff/3600000)}時間前`;
  const y = d.getFullYear(), m = d.getMonth()+1, day = d.getDate();
  if (y === now.getFullYear()) return `${m}/${day}`;
  return `${y}/${m}/${day}`;
}

function formatDateFull(ts) {
  if (!ts) return "";
  const d = ts.toDate ? ts.toDate() : new Date(ts);
  return `${d.getFullYear()}/${String(d.getMonth()+1).padStart(2,"0")}/${String(d.getDate()).padStart(2,"0")}`;
}

// ── ハイライト ──
function highlight(text, q) {
  if (!q) return escHtml(text);
  const esc = q.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
  return escHtml(text).replace(new RegExp(esc, "gi"), m => `<span class="match">${m}</span>`);
}
function escHtml(s) {
  return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

// ── リスト描画 ──
function renderList() {
  const q = searchQuery.trim().toLowerCase();
  const filtered = q
    ? memos.filter(m => m.body.toLowerCase().includes(q))
    : memos;

  memoList.innerHTML = "";

  if (filtered.length === 0 && memos.length > 0) {
    memoList.innerHTML = `<div style="text-align:center;color:var(--text-dim);font-family:'DM Mono',monospace;font-size:12px;margin-top:60px;letter-spacing:.1em">見つからない</div>`;
    return;
  }

  filtered.forEach(m => {
    const preview = m.body.replace(/\n/g, " ").trim() || "（空のメモ）";
    const item = document.createElement("div");
    item.className = "memo-item" + (m.id === currentId ? " selected" : "");
    item.innerHTML = `
      <div class="memo-preview">${highlight(preview.slice(0, 80), q)}</div>
      <div class="memo-date">${formatDate(m.createdAt)}</div>
    `;
    item.addEventListener("click", () => openEditor(m.id));
    memoList.appendChild(item);
  });
}

// ── エディタを開く ──
function openEditor(id) {
  const memo = memos.find(m => m.id === id);
  if (!memo) return;
  currentId = id;
  editorArea.value = memo.body;
  editorMeta.textContent = memo.createdAt ? `作成 ${formatDateFull(memo.createdAt)}` : "";
  btnDelete.classList.add("visible");
  editorPanel.classList.add("open");
  renderList();
  setTimeout(() => editorArea.focus(), 300);
}

// ── 新規メモ ──
btnNew.addEventListener("click", async () => {
  try {
    const docRef = await addDoc(collection(db, COLL), {
      body: "",
      createdAt: serverTimestamp(),
      updatedAt: serverTimestamp()
    });
    // ローカルに即追加
    memos.unshift({ id: docRef.id, body: "", createdAt: null, updatedAt: null });
    openEditor(docRef.id);
  } catch (e) {
    showStatus("エラー");
    console.error(e);
  }
});

// ── 戻る ──
btnBack.addEventListener("click", () => {
  flushSave();
  editorPanel.classList.remove("open");
  currentId = null;
  renderList();
});

// ── 自動保存 ──
editorArea.addEventListener("input", () => {
  clearTimeout(saveTimer);
  saveTimer = setTimeout(flushSave, 1200);
});

async function flushSave() {
  clearTimeout(saveTimer);
  if (!currentId) return;
  const body = editorArea.value;
  const memo = memos.find(m => m.id === currentId);
  if (!memo || memo.body === body) return;
  memo.body = body;
  memo.updatedAt = new Date();
  try {
    await updateDoc(doc(db, COLL, currentId), {
      body,
      updatedAt: serverTimestamp()
    });
    showStatus("保存した");
  } catch (e) {
    showStatus("保存エラー");
    console.error(e);
  }
}

// ── 削除 ──
btnDelete.addEventListener("click", async () => {
  if (!currentId) return;
  if (!confirm("このメモを削除する？")) return;
  try {
    await deleteDoc(doc(db, COLL, currentId));
    memos = memos.filter(m => m.id !== currentId);
    currentId = null;
    editorPanel.classList.remove("open");
    renderList();
    showStatus("削除した");
  } catch (e) {
    showStatus("削除エラー");
    console.error(e);
  }
});

// ── 検索 ──
searchInput.addEventListener("input", e => {
  searchQuery = e.target.value;
  renderList();
});

// ── Firestore リアルタイム同期 ──
const q = query(collection(db, COLL), orderBy("updatedAt", "desc"));
onSnapshot(q, snapshot => {
  memos = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
  renderList();
}, err => {
  console.error(err);
  memoList.innerHTML = `<div style="text-align:center;color:var(--text-dim);font-family:'DM Mono',monospace;font-size:12px;margin-top:60px;">接続エラー</div>`;
});

// ── 戻るキー（Android対応） ──
window.addEventListener("popstate", () => {
  if (editorPanel.classList.contains("open")) {
    flushSave();
    editorPanel.classList.remove("open");
    currentId = null;
    renderList();
  }
});
</script>

</body>
